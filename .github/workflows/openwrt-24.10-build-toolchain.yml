name: openwrt-24.10-cache

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select the build device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - 'rockchip'
          - 'mt798x'
          - 'ipq807x'
          - 'ipq50xx'
          - 'x86_64'

jobs:
  build:
    name: Build ${{ github.event.inputs.device }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Setup environment variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo "BUILD_DIR=/builder/${{ github.event.inputs.device }}" >> "$GITHUB_ENV"

    - name: Free disk space
      uses: oppen321/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Restore build cache for ${{ github.event.inputs.device }}
      uses: actions/cache@v3
      with:
        path: |
          /builder/${{ github.event.inputs.device }}/staging_dir
          /builder/${{ github.event.inputs.device }}/build_dir
          /builder/${{ github.event.inputs.device }}/dl
          /builder/${{ github.event.inputs.device }}/tmp
        key: openwrt-cache-${{ github.event.inputs.device }}-${{ github.run_id }}
        restore-keys: |
          openwrt-cache-${{ github.event.inputs.device }}-

    - name: Build System Setup
      uses: oppen321/actions@openwrt-build-setup
      with:
        device: ${{ github.event.inputs.device }}

    - name: Compile OpenWrt for ${{ github.event.inputs.device }}
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        make -j$(nproc) V=s

    - name: Create cache archive
      run: |
        tar -czf openwrt-cache-${{ github.event.inputs.device }}.tar.gz -C ${{ env.BUILD_DIR }} staging_dir build_dir dl tmp
        ls -lh openwrt-cache-${{ github.event.inputs.device }}.tar.gz

    - name: Upload cache file to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: cache-${{ github.event.inputs.device }}-${{ github.run_number }}
        files: openwrt-cache-${{ github.event.inputs.device }}.tar.gz
        body: "Cached build files for ${{ github.event.inputs.device }}"
        draft: false
        prerelease: false
