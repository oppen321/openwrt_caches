name: openwrt-24.10-cache

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.model }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        model:
          - rockchip
          - x86_64

    steps:
    - name: Checkout openwrt 24.10 source code
      uses: actions/checkout@v4
      with:
        repository: openwrt/openwrt  # 克隆 OpenWrt 官方仓库
        ref: openwrt-24.10  # 选择 openwrt-24.10 分支

    - name: Setup environment variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo "BUILD_DIR=/builder/${{ matrix.model }}" >> "$GITHUB_ENV"

    - name: Free disk space
      uses: oppen321/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Restore build cache for ${{ matrix.model }}
      uses: actions/cache@v3
      with:
        path: |
          /builder/${{ matrix.model }}/staging_dir
          /builder/${{ matrix.model }}/build_dir
          /builder/${{ matrix.model }}/dl
          /builder/${{ matrix.model }}/tmp
        key: openwrt-cache-${{ matrix.model }}-${{ github.run_id }}
        restore-keys: |
          openwrt-cache-${{ matrix.model }}-

    - name: Build System Setup
      uses: oppen321/actions@openwrt-build-setup
      with:
        device: ${{ matrix.model }}

    - name: Set .config for ${{ matrix.model }}
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        make clean
        cp configs/${{ matrix.model }}.config .config
        make defconfig
        echo "Applied config for ${{ matrix.model }}"

    - name: Compile OpenWrt for ${{ matrix.model }}
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        make -j$(nproc) V=s

    - name: Create cache archive
      run: |
        tar -czf openwrt-cache-${{ matrix.model }}.tar.gz -C ${{ env.BUILD_DIR }} staging_dir build_dir dl tmp
        ls -lh openwrt-cache-${{ matrix.model }}.tar.gz

    - name: Upload cache file to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: cache-${{ matrix.model }}-${{ github.run_number }}
        files: openwrt-cache-${{ matrix.model }}.tar.gz
        body: "Cached build files for ${{ matrix.model }}"
        draft: false
        prerelease: false
